<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IEM Rio 2026 | GWE</title>
    <link href="https://fonts.googleapis.com/css2?family=Play:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #ffffff;
            --bg-dark: #000000;
            --panel-light: #f8f8f8;
            --accent: #000000;
            --text-main: #000000;
            --text-muted: #888888;
            --border-color: #eeeeee;
            --font-main: 'Play', sans-serif;
            --font-heading: 'Broaven oblique', 'Play', sans-serif;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-main);
            color: var(--text-main);
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        /* --- ХЕДЕР --- */
        .tournament-banner {
            background: var(--bg-dark);
            color: #fff;
            padding: 60px 10%;
            text-align: center;
            position: relative;
        }

        .event-title {
            font-family: var(--font-heading);
            font-size: clamp(32px, 5vw, 48px);
            margin: 15px 0;
            text-transform: uppercase;
            letter-spacing: 3px;
        }

        .status-badge {
            display: inline-block;
            border: 1px solid #fff;
            padding: 4px 15px;
            font-size: 10px;
            text-transform: uppercase;
            font-weight: bold;
            letter-spacing: 1px;
        }

        /* --- НАВИГАЦИЯ --- */
        .tourney-nav {
            background: var(--bg-main);
            display: flex;
            justify-content: center;
            border-bottom: 1px solid var(--border-color);
        }

        .nav-tab {
            padding: 20px 40px;
            color: var(--text-muted);
            text-decoration: none;
            font-weight: bold;
            font-size: 13px;
            text-transform: uppercase;
            transition: 0.2s;
        }

        .nav-tab.active {
            color: var(--text-main);
            box-shadow: inset 0 -2px 0 var(--bg-dark);
        }

        /* --- ИНФО-ПАНЕЛЬ (Без Location) --- */
        .quick-info {
            background: var(--panel-light);
            display: grid;
            grid-template-columns: repeat(3, 1fr); /* Изменено на 3 колонки */
            padding: 25px 10%;
            border-bottom: 1px solid var(--border-color);
        }

        .info-cell { text-align: center; border-right: 1px solid #ddd; }
        .info-cell:last-child { border-right: none; }

        .info-label { display: block; font-size: 10px; color: var(--text-muted); text-transform: uppercase; margin-bottom: 5px; letter-spacing: 1px; }
        .info-value { display: block; font-size: 18px; font-weight: 700; }

        /* --- СЕТКА --- */
        .content-section { padding: 60px 10%; }

        .section-header {
            font-family: var(--font-heading);
            font-size: 18px;
            text-transform: uppercase;
            border-bottom: 2px solid var(--bg-dark);
            padding-bottom: 10px;
            margin-bottom: 40px;
            display: inline-block;
        }

        .bracket-container {
            display: flex;
            gap: 40px;
            overflow-x: auto;
            padding: 10px 0;
        }

        .round-name {
            font-size: 11px;
            color: var(--text-muted);
            margin-bottom: 15px;
            text-align: center;
            font-weight: bold;
            text-transform: uppercase;
        }

        .match-box {
            background: #fff;
            border: 1px solid var(--border-color);
            width: 240px;
            margin-bottom: 25px;
            transition: transform 0.2s;
        }

        .match-box:hover { border-color: var(--bg-dark); }

        .team-row {
            padding: 12px 15px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid var(--border-color);
        }

        .team-row:last-child { border-bottom: none; }
        .team-row.winner { background: var(--panel-light); font-weight: bold; }
        
        .score { font-weight: bold; font-size: 14px; }

        .back-link {
            position: absolute;
            top: 25px;
            left: 5%;
            color: #fff;
            text-decoration: none;
            font-size: 11px;
            letter-spacing: 1px;
            opacity: 0.6;
            transition: 0.3s;
        }
        .back-link:hover { opacity: 1; }

        footer {
            padding: 50px 10%;
            text-align: center;
            background: var(--panel-light);
            color: var(--text-muted);
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }
    </style>
</head>
<body>

    <header class="tournament-banner">
        <a href="index.html" class="back-link">← BACK TO LIST</a>
        <div class="status-badge">Upcoming</div>
        <h1 class="event-title">IEM Rio 2026</h1>
    </header>

    <nav class="tourney-nav">
        <a href="#" class="nav-tab active">Overview</a>
        <a href="#" class="nav-tab">Matches</a>
        <a href="#" class="nav-tab">Fantasy</a>
    </nav>

    <div class="quick-info">
        <div class="info-cell">
            <span class="info-label">Date</span>
            <span class="info-value">13.04 — 19.04.2026</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Prize pool</span>
            <span class="info-value">$1,000,000</span>
        </div>
        <div class="info-cell">
            <span class="info-label">Teams</span>
            <span class="info-value">16</span>
        </div>
    </div>

    <main class="content-section">
        <div class="section-header">Playoffs Bracket</div>

        <div class="bracket-container">
            <div class="bracket-column">
                <div class="round-name">Semi-Finals</div>
                <div class="match-box">
                    <div class="team-row winner">
                        <span>Team Spirit</span>
                        <span class="score">2</span>
                    </div>
                    <div class="team-row">
                        <span>G2 Esports</span>
                        <span class="score">0</span>
                    </div>
                </div>
                <div class="match-box">
                    <div class="team-row winner">
                        <span>FaZe Clan</span>
                        <span class="score">2</span>
                    </div>
                    <div class="team-row">
                        <span>NaVi</span>
                        <span class="score">1</span>
                    </div>
                </div>
            </div>

            <div class="bracket-column">
                <div class="round-name">Grand Final</div>
                <div class="match-box" style="margin-top: 55px; border: 2px solid var(--bg-dark);">
                    <div class="team-row">
                        <span>Team Spirit</span>
                        <span class="score">-</span>
                    </div>
                    <div class="team-row">
                        <span>FaZe Clan</span>
                        <span class="score">-</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <footer>
        &copy; 2026 Garnir World Esports • Official Tournament Platform
    </footer>

</body>
</html>
