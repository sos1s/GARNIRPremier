<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament Details | GWE</title>
    <link href="https://fonts.googleapis.com/css2?family=Play:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-white: #ffffff;
            --text-black: #000000;
            --accent-gray: #f4f4f4;
            --font-main: 'Play', sans-serif;
            --font-heading: 'Broaven oblique', 'Play', sans-serif;
        }

        body {
            font-family: var(--font-main);
            background: var(--bg-white);
            color: var(--text-black);
            margin: 0;
        }

        .container { padding: 60px 10%; }

        header {
            background: #000;
            color: #fff;
            padding: 80px 10%;
            text-align: center;
        }

        .back-btn {
            display: inline-block;
            margin-bottom: 20px;
            color: #fff;
            text-decoration: none;
            text-transform: uppercase;
            font-size: 12px;
            border: 1px solid #333;
            padding: 8px 15px;
            transition: 0.3s;
        }
        .back-btn:hover { background: #fff; color: #000; }

        .info-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-top: 40px;
            border-top: 1px solid #eee;
            padding-top: 40px;
        }

        .info-item h4 { text-transform: uppercase; color: #888; font-size: 12px; }
        .info-item p { font-size: 20px; font-weight: bold; }

        /* СЕТКА (BRACKET) */
        .bracket-section {
            background: #f9f9f9;
            padding: 80px 10%;
        }

        .bracket-container {
            display: flex;
            gap: 50px;
            align-items: center;
            overflow-x: auto;
            padding-bottom: 20px;
        }

        .round {
            display: flex;
            flex-direction: column;
            gap: 40px;
            min-width: 200px;
        }

        .match {
            background: #fff;
            border: 1px solid #ddd;
            display: flex;
            flex-direction: column;
        }

        .match-team {
            padding: 10px 15px;
            display: flex;
            justify-content: space-between;
            font-weight: bold;
            border-bottom: 1px solid #eee;
        }

        .match-team.winner { color: #000; background: #f0f0f0; }
        .match-team:last-child { border-bottom: none; }
        .score { color: #888; }

        .round-title {
            text-align: center;
            margin-bottom: 20px;
            font-family: var(--font-heading);
            text-transform: uppercase;
            font-size: 14px;
            color: #555;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="back-btn">← Назад к списку</a>
        <h1 style="font-family: var(--font-heading); font-size: 48px;">TURNIR GARNIR 1</h1>
        <p style="opacity: 0.6;">Завершен • 10 Марта 2026</p>

        <div class="info-grid">
            <div class="info-item">
                <h4>Призовой фонд</h4>
                <p>1,500 RUB</p>
            </div>
            <div class="info-item">
                <h4>Участники</h4>
                <p>16 Команд</p>
            </div>
            <div class="info-item">
                <h4>Формат</h4>
                <p>SE (bo1 / bo3)</p>
            </div>
        </div>
    </header>

    <section class="bracket-section">
        <h2 style="font-family: var(--font-heading); margin-bottom: 40px;">Турнирная сетка</h2>
        
        <div class="bracket-container">
            <div class="round">
                <div class="round-title">Semi-Finals</div>
                <div class="match">
                    <div class="match-team winner">Team Spirit <span class="score">2</span></div>
                    <div class="match-team">G2 Esports <span class="score">0</span></div>
                </div>
                <div class="match">
                    <div class="match-team winner">FaZe Clan <span class="score">2</span></div>
                    <div class="match-team">NaVi <span class="score">1</span></div>
                </div>
            </div>

            <div class="round">
                <div class="round-title">Grand Final</div>
                <div class="match" style="border: 2px solid #000;">
                    <div class="match-team winner">Team Spirit <span class="score">2</span></div>
                    <div class="match-team">FaZe Clan <span class="score">1</span></div>
                </div>
            </div>

            <div class="round">
                <div class="round-title">Champion</div>
                <div style="text-align: center;">
                    <div style="font-size: 40px;">🏆</div>
                    <div style="font-weight: bold; font-size: 24px;">Team Spirit</div>
                </div>
            </div>
        </div>
    </section>

    <footer style="padding: 60px; text-align: center; border-top: 1px solid #eee;">
        <p>&copy; 2026 Garnir World Esports</p>
    </footer>

</body>
</html>
