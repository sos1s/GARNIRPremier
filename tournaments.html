<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GARNIR PREMIER | ТУРНИРЫ</title>
    <link href="https://fonts.googleapis.com/css2?family=Play:wght@400;700&display=swap" rel="stylesheet">
    <style>
        /* 1. БАЗОВЫЕ НАСТРОЙКИ ФОНА */
        html { scrollbar-gutter: stable; background-color: #000; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Play', sans-serif !important; }
        
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        body { 
            opacity: 0;
            animation: fadeIn 0.5s ease-out forwards;
            margin: 0;
            min-height: 100vh; 
            background: #000 url('img/bgsait.png') no-repeat center center fixed;
            background-size: cover;
            color: #fff;
            overflow-x: hidden;
        }

        /* 2. ШАПКА */
        nav {
            height: 70px; background: #000;
            display: flex; align-items: center; justify-content: space-between;
            padding: 0 40px; border-bottom: 1px solid rgba(255,255,255,0.1);
        }
        .nav-left { display: flex; align-items: center; gap: 40px; }
        .my-logo { height: 60px; cursor: pointer; }
        .nav-menu { display: flex; gap: 30px; }
        .nav-link { color: #fff; text-decoration: none; font-size: 14px; font-weight: 700; text-transform: uppercase; opacity: 0.8; transition: 0.3s; }
        .nav-link:hover, .nav-link.active { color: #FF0033; opacity: 1; }
        .nav-right { color: #999; font-size: 11px; font-weight: 700; text-transform: uppercase; }

        /* 3. СЕТКА НА ВСЮ ШИРИНУ */
        .main-container {
            max-width: 100%;
            margin: 40px 0;
            padding: 0 40px;
            display: block;
        }

        .group-title {
            font-size: 18px;
            text-transform: uppercase;
            font-weight: 700;
            margin-bottom: 15px;
            margin-top: 30px;
            color: #fff;
        }

        /* 5. КАРТОЧКА ТУРНИРА */
        .t-card {
            background: rgba(22, 12, 18, 0.85);
            border: 1px solid rgba(255, 255, 255, 0.05);
            display: flex; 
            align-items: stretch; 
            margin-bottom: 8px; 
            height: 55px; 
            transition: 0.3s ease; /* Плавный переход для свечения */
            text-decoration: none;
            color: inherit;
            overflow: hidden;
            border-radius: 8px;
            width: 100%;
        }

        /* ЭФФЕКТ СВЕЧЕНИЯ ПРИ НАВЕДЕНИИ (БЕЗ ДВИЖЕНИЯ) */
        .t-card:hover { 
            background: rgba(255, 255, 255, 0.1); /* Сделали чуть светлее */
            border-color: rgba(255, 255, 255, 0.2);
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.05); /* Мягкое свечение */
        }

        /* БЛОК ЛОГОТИПА (БАННЕР) */
        .t-logo-box {
            width: 160px; 
            background: #000;
            display: flex;
            align-items: center;
            justify-content: center;
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            overflow: hidden;
            border-radius: 8px 0 0 8px;
        }
        .t-logo-box img {
            width: 100%;
            height: 100%;
            object-fit: cover; 
            object-position: center;
        }

        .t-content {
            flex: 1;
            display: flex;
            align-items: center;
            padding: 0 20px;
            justify-content: space-between;
        }

        .t-name {
            font-size: 13px;
            font-weight: 700;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            margin-right: 20px;
        }

        .t-right-side {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        .t-stats {
            display: flex;
            align-items: center;
            gap: 8px;
            font-size: 11px;
            color: #777;
            text-transform: uppercase;
        }
        .dot { width: 3px; height: 3px; background: #444; border-radius: 50%; }

        .t-date {
            border: 1px solid #fff;
            border-radius: 4px;
            padding: 2px 10px;
            font-size: 11px;
            font-weight: 700;
            min-width: 90px;
            text-align: center;
            white-space: nowrap;
        }

        .ongoing .t-date {
            border-color: #FF0033;
            color: #FF0033;
        }
    </style>
</head>
<body>

<nav>
    <div class="nav-left">
        <img src="img/logo.png" class="my-logo" onclick="location.href='index.html'">
        <div class="nav-menu">
            <a href="index.html" class="nav-link">Главная</a>
            <a href="tournaments.html" class="nav-link active">Турниры</a> 
            <a href="#" class="nav-link">Партнеры</a>
        </div>
    </div>
    <div class="nav-right">GARNIR PREMIER • DASHBOARD</div>
</nav>

<div class="main-container">
    <main>
        <div class="group-title">Ongoing</div>
        <a href="#" class="t-card ongoing">
            <div class="t-logo-box"><img src="img/t1_photo.png"></div>
            <div class="t-content">
                <div class="t-name">Turnir GARNIR 1</div>
                <div class="t-right-side">
                    <div class="t-stats">
                        16 Teams <div class="dot"></div> 
                        $1,100,000 <div class="dot"></div> 
                    </div>
                    <div class="t-date">MAR 18 - 29</div>
                </div>
            </div>
        </a>

        <div class="group-title">Upcoming</div>
        
        <a href="#" class="t-card">
            <div class="t-logo-box"><img src="img/grt_logo.png"></div>
            <div class="t-content">
                <div class="t-name">GRT Roflotur 2026</div>
                <div class="t-right-side">
                    <div class="t-stats">8 Teams <div class="dot"></div> ??? <div class="dot"></div> XPLAY.gg</div>
                    <div class="t-date">ФЕВ 27 - МАР 6</div>
                </div>
            </div>
        </a>

        <a href="#" class="t-card">
            <div class="t-logo-box"><img src="iem_logo.png"></div>
            <div class="t-content">
                <div class="t-name">IEM Rio 2026</div>
                <div class="t-right-side">
                    <div class="t-stats">16 Teams <div class="dot"></div> $300,000 <div class="dot"></div> Rio De Janeiro, Brazil</div>
                    <div class="t-date">ФЕВ 27 - МАР 6</div>
                </div>
            </div>
        </a>
    </main>
</div>

<script>
    document.querySelectorAll('.nav-link').forEach(link => {
        link.addEventListener('click', function(e) {
            if (this.href.includes('.html')) {
                e.preventDefault();
                let target = this.href;
                document.body.style.transition = 'opacity 0.3s ease';
                document.body.style.opacity = '0';
                setTimeout(() => { window.location.href = target; }, 300);
            }
        });
    });
</script>

</body>
</html>
