<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GWE CS2 | Esports League</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav class="side-nav">
        <div class="logo">GWE</div>
        <ul class="nav-links">
            <li class="active"><i class="icon-home"></i><span>Home</span></li>
            <li><i class="icon-trophy"></i><span>Tournaments</span></li>
            <li><i class="icon-ticket"></i><span>Tickets</span></li>
            <li><i class="icon-news"></i><span>News</span></li>
        </ul>
        <div class="nav-footer">
            <button class="login-btn">Login</button>
        </div>
    </nav>

    <main class="main-content">
        <section class="hero">
            <div class="overlay"></div>
            <div class="hero-body">
                <span class="date-badge">01 SEPTEMBER – 15 OCTOBER 2026</span>
                <h1 class="main-title">GWE PREMIER</h1>
                <p class="hero-desc">THE ULTIMATE CS2 BATTLEGROUND</p>
                
                <div class="countdown">
                    <div class="time-block"><span>85</span><label>DAYS</label></div>
                    <div class="time-block"><span>19</span><label>HOURS</label></div>
                    <div class="time-block"><span>22</span><label>MINS</label></div>
                    <div class="time-block"><span>32</span><label>SECS</label></div>
                </div>

                <button class="scroll-info">SCROLL FOR INFO ↓</button>
            </div>
        </section>

        <section class="road-to">
            <h2>Road to GWE 2026</h2>
            <div class="progress-container">
                <div class="progress-bar" style="width: 20%;">
                    <span class="progress-text">20%</span>
                </div>
            </div>
        </section>
    </main>
</body>
</html>
